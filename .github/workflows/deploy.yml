name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Generate index.html and 404.html
        run: node scripts/generate-index.mjs

      - name: Deploy to gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Save built files before switching branches
          cp dist/client/index.html /tmp/index.html
          cp dist/client/404.html /tmp/404.html
          cp -r dist/client/assets /tmp/assets

          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          git checkout gh-pages || git checkout -b gh-pages
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean working tree completely (keep only .git)
          find . -maxdepth 1 ! -name '.git' -exec rm -rf {} + 2>/dev/null || true

          # Restore built SPA files
          cp /tmp/index.html .
          cp /tmp/404.html .
          cp -r /tmp/assets .
          touch .nojekyll

          git add -A
          git commit -m "Deploy: $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push -f origin gh-pages
